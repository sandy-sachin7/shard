name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: shard

jobs:
  build:
    name: Build · ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ──────────────────────────────────────────────────────────
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset_suffix: x86_64-linux.tar.gz
            cross: false

          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            asset_suffix: aarch64-linux.tar.gz
            cross: true

          # ── macOS ──────────────────────────────────────────────────────────
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_suffix: x86_64-macos.tar.gz
            cross: false

          - os: macos-latest
            target: aarch64-apple-darwin
            asset_suffix: aarch64-macos.tar.gz
            cross: false

          # ── Windows ────────────────────────────────────────────────────────
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_suffix: x86_64-windows.zip
            cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux musl targets)
        if: contains(matrix.target, 'musl')
        run: sudo apt-get install -y musl-tools

      - name: Install cross (aarch64)
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (native)
        if: ${{ !matrix.cross }}
        shell: bash
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        shell: bash
        run: |
          cross build --release --target ${{ matrix.target }}

      # ── Package ────────────────────────────────────────────────────────────
      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BINARY="target/${{ matrix.target }}/release/${BINARY_NAME}"
          STAGING="${BINARY_NAME}-${{ github.ref_name }}-${{ matrix.asset_suffix }}"
          STAGING="${STAGING%.tar.gz}"
          mkdir -p "${STAGING}"
          cp "${BINARY}" "${STAGING}/"
          cp README.md LICENSE "${STAGING}/"
          tar czf "${STAGING}.tar.gz" "${STAGING}"
          echo "ASSET=${STAGING}.tar.gz" >> $GITHUB_ENV

          sha256sum "${STAGING}.tar.gz" > "${STAGING}.tar.gz.sha256"
          echo "ASSET_SHA=${STAGING}.tar.gz.sha256" >> $GITHUB_ENV

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binary = "target/${{ matrix.target }}/release/${env:BINARY_NAME}.exe"
          $staging = "${env:BINARY_NAME}-${{ github.ref_name }}-${{ matrix.asset_suffix }}"
          $staging = $staging -replace '\.zip$', ''
          New-Item -ItemType Directory -Path $staging | Out-Null
          Copy-Item $binary "$staging\"
          Copy-Item README.md, LICENSE "$staging\"
          Compress-Archive -Path "$staging\*" -DestinationPath "$staging.zip"
          echo "ASSET=$staging.zip" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          $hash = (Get-FileHash "$staging.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $staging.zip" | Out-File -Encoding utf8 "$staging.zip.sha256"
          echo "ASSET_SHA=$staging.zip.sha256" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ASSET }}
            ${{ env.ASSET_SHA }}

  # ── Publish crate to crates.io after all builds succeed ──────────────────
  publish:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish shard-crypto
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p shard-crypto

      - name: Publish shard-storage
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p shard-storage

      - name: Publish shard-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p shard-core

      - name: Publish shard-net
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p shard-net

      - name: Publish shard-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p shard-cli
